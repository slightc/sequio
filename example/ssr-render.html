<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>server-side render</title>
    <style>
      body { margin: 0; padding: 24px; background: #0b0b0e; font-family: system-ui, sans-serif; color: #e6e6ea; }
      h1 { font-size: 15px; opacity: 0.85; }
      #stage canvas { border-radius: 8px; box-shadow: 0 6px 24px rgba(0, 0, 0, 0.5); }
    </style>
  </head>
  <body>
    <h1>Server-side render (Route A: headless Chrome)</h1>
    <p style="opacity: 0.55; font-size: 13px; max-width: 620px;">
      Exposes <code>window.__SSR__.render(spec)</code> — the Node worker
      (<code>scripts/ssr-render.cjs</code>) drives it. On load it also renders the
      built-in sample and reports on <code>window.__SSR_TEST__</code>.
    </p>
    <div id="stage"></div>
    <script type="module" src="/example/ssr-render.ts"></script>
  </body>
</html>
