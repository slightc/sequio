<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sequio · mini multi-track editor</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0b0e;
        --panel: #16161c;
        --panel-2: #1d1d25;
        --border: #2a2a34;
        --accent: #2b6cff;
        --text: #e6e6ea;
        --muted: rgba(230, 230, 234, 0.55);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        font-size: 13px;
      }
      h1 { font-size: 15px; font-weight: 600; margin: 0; opacity: 0.9; }
      .app { display: flex; flex-direction: column; height: 100vh; }

      /* ── Toolbar ─────────────────────────────────────────── */
      .toolbar {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        background: var(--panel);
      }
      .toolbar .spacer { flex: 1; }
      .toolbar .group { display: flex; gap: 6px; align-items: center; }
      .toolbar .sep { width: 1px; height: 22px; background: var(--border); margin: 0 4px; }

      button {
        background: var(--accent);
        color: #fff;
        border: 0;
        border-radius: 6px;
        padding: 7px 12px;
        font-size: 13px;
        cursor: pointer;
        white-space: nowrap;
      }
      button.ghost {
        background: var(--panel-2);
        border: 1px solid var(--border);
        color: var(--text);
      }
      button:disabled { opacity: 0.4; cursor: not-allowed; }
      button:hover:not(:disabled) { filter: brightness(1.1); }
      label.file {
        background: var(--panel-2);
        border: 1px solid var(--border);
        color: var(--text);
        border-radius: 6px;
        padding: 7px 12px;
        cursor: pointer;
        white-space: nowrap;
      }
      label.file input { display: none; }

      /* ── Main area ───────────────────────────────────────── */
      .main {
        display: flex;
        gap: 16px;
        padding: 16px;
        flex: 1;
        min-height: 0;
        overflow: auto;
      }
      .stage-col { display: flex; flex-direction: column; gap: 12px; }
      #stage { position: relative; display: inline-block; line-height: 0; }
      #stage canvas {
        border-radius: 10px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.55);
        background: #000;
      }
      /* Interaction overlay: drag to move, corner handles to resize. */
      #overlay {
        position: absolute;
        inset: 0;
        touch-action: none;
      }
      #sel-box {
        position: absolute;
        border: 1.5px solid #6ea0ff;
        box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.4);
        cursor: move;
        display: none;
      }
      #sel-box .handle {
        position: absolute;
        width: 12px;
        height: 12px;
        background: #fff;
        border: 1.5px solid #6ea0ff;
        border-radius: 3px;
      }
      #sel-box .handle.nw { left: -7px; top: -7px; cursor: nwse-resize; }
      #sel-box .handle.ne { right: -7px; top: -7px; cursor: nesw-resize; }
      #sel-box .handle.sw { left: -7px; bottom: -7px; cursor: nesw-resize; }
      #sel-box .handle.se { right: -7px; bottom: -7px; cursor: nwse-resize; }
      .transport {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .transport #scrub { flex: 1; }
      #time { font-variant-numeric: tabular-nums; color: var(--muted); min-width: 96px; }

      /* ── Inspector ───────────────────────────────────────── */
      .inspector {
        width: 260px;
        flex-shrink: 0;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 14px;
        align-self: flex-start;
      }
      .inspector h2 {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
        margin: 0 0 12px;
      }
      .row { display: flex; align-items: center; gap: 8px; margin: 9px 0; }
      .row .lbl { width: 70px; color: var(--muted); flex-shrink: 0; }
      .row input[type='number'], .row input[type='text'] {
        flex: 1;
        min-width: 0;
        background: #0f0f14;
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 5px;
        padding: 5px 7px;
        font-size: 12px;
      }
      .row input[type='range'] { flex: 1; }
      .row .val { width: 46px; text-align: right; color: var(--muted); font-variant-numeric: tabular-nums; }
      .empty-hint { color: var(--muted); line-height: 1.5; }
      .danger { background: #b3283a; width: 100%; margin-top: 8px; }

      /* ── Timeline ────────────────────────────────────────── */
      .timeline {
        border-top: 1px solid var(--border);
        background: var(--panel);
        padding: 12px 16px 18px;
        overflow-x: auto;
      }
      .timeline-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
      .timeline-head .hint { color: var(--muted); font-size: 12px; }
      .ruler {
        position: relative;
        height: 18px;
        margin-left: 120px;
        border-bottom: 1px solid var(--border);
      }
      .ruler .tick {
        position: absolute;
        top: 0;
        height: 100%;
        border-left: 1px solid var(--border);
        padding-left: 4px;
        font-size: 10px;
        color: var(--muted);
      }
      .ruler .playhead {
        position: absolute;
        top: -4px;
        width: 2px;
        height: calc(100% + 8px);
        background: #ff5470;
        pointer-events: none;
        z-index: 5;
      }
      .track-row {
        display: flex;
        align-items: stretch;
        gap: 0;
        margin-top: 8px;
      }
      .track-label {
        width: 120px;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 4px;
        padding-right: 10px;
        cursor: pointer;
        border-right: 1px solid var(--border);
      }
      .track-label .name { font-size: 12px; font-weight: 600; }
      .track-label .meta { font-size: 10px; color: var(--muted); }
      .track-label.active .name { color: #6ea0ff; }
      .track-lane {
        position: relative;
        flex: 1;
        height: 44px;
        background: repeating-linear-gradient(
          90deg, transparent, transparent 79px, rgba(255,255,255,0.04) 79px, rgba(255,255,255,0.04) 80px
        );
        border-radius: 6px;
      }
      .clip-block {
        position: absolute;
        top: 5px;
        height: 34px;
        border-radius: 5px;
        display: flex;
        align-items: center;
        padding: 0 8px;
        font-size: 11px;
        color: #fff;
        cursor: grab;
        overflow: hidden;
        white-space: nowrap;
        user-select: none;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.15);
      }
      .clip-block.selected { box-shadow: 0 0 0 2px #fff, inset 0 0 0 1px rgba(255,255,255,0.15); }
      .clip-block .resize {
        position: absolute;
        right: 0; top: 0;
        width: 8px; height: 100%;
        cursor: ew-resize;
        background: rgba(0, 0, 0, 0.2);
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="toolbar">
        <h1>Mini Editor</h1>
        <span class="sep"></span>
        <div class="group">
          <button id="add-text" class="ghost">+ Text</button>
          <button id="add-rect" class="ghost">+ Rect</button>
          <button id="add-ellipse" class="ghost">+ Ellipse</button>
          <label class="file">+ Image<input id="add-image" type="file" accept="image/*" /></label>
          <label class="file">+ Video<input id="add-video" type="file" accept="video/*" /></label>
          <button id="add-image-url" class="ghost">+ Image URL</button>
          <button id="add-video-url" class="ghost">+ Video URL</button>
        </div>
        <span class="sep"></span>
        <button id="add-track" class="ghost">+ Track</button>
        <span class="sep"></span>
        <a href="/code.html" class="file" style="text-decoration: none" title="Author a composition as multi-file TS/JS code">‹› Code Mode</a>
        <span class="spacer"></span>
        <span id="status" style="color: var(--muted)"></span>
        <div class="group">
          <select id="export-format" class="ghost" style="padding: 7px 8px">
            <option value="mp4">MP4</option>
            <option value="webm">WebM</option>
          </select>
          <button id="server-render" class="ghost" title="Serialize this timeline to a TimelineSpec JSON for server-side rendering (pnpm ssr:render / ssr:render-node)">⇪ Server Render</button>
          <button id="export">⬇ Export</button>
        </div>
      </div>

      <div class="main">
        <div class="stage-col">
          <div id="stage">
            <div id="overlay">
              <div id="sel-box">
                <div class="handle nw"></div>
                <div class="handle ne"></div>
                <div class="handle sw"></div>
                <div class="handle se"></div>
              </div>
            </div>
          </div>
          <div class="transport">
            <button id="play">▶ Play</button>
            <input id="scrub" type="range" min="0" max="6" step="0.01" value="0" />
            <span id="time">0.00 / 0.00s</span>
          </div>
        </div>
        <div class="inspector" id="inspector"></div>
      </div>

      <div class="timeline">
        <div class="timeline-head">
          <strong>Timeline</strong>
          <span class="hint">Drag a clip to move it (across tracks too) · drag its right edge to trim · click to select</span>
        </div>
        <div class="ruler" id="ruler"></div>
        <div id="tracks"></div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
